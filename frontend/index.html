<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE Flipper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0d0d0d;
      }

      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div aria-hidden="true" class="pointer-events-none fixed inset-0 z-[12000] opacity-100">
        <div class="absolute inset-0 eve-preloader-backdrop"></div>
        <div class="absolute inset-0 eve-preloader-grid"></div>
        <div class="absolute inset-0 overflow-hidden">
          <div class="eve-preloader-sweep"></div>
        </div>
        <div class="relative z-10 flex h-full items-center justify-center px-4 sm:px-6">
          <div class="eve-preloader-radar-field"></div>
          <div class="eve-preloader-shell w-full max-w-[620px]">
            <div class="eve-preloader-shell-head">
              <span class="eve-preloader-led"></span>
              <span class="eve-preloader-headline">EVE Flipper</span>
              <span class="eve-preloader-build">DEV</span>
            </div>
            <div class="eve-preloader-main">
              <div class="eve-preloader-core-wrap">
                <div class="eve-preloader-core">
                  <div class="eve-preloader-core-ring eve-preloader-core-ring--outer"></div>
                  <div class="eve-preloader-core-ring eve-preloader-core-ring--mid"></div>
                  <div class="eve-preloader-core-ring eve-preloader-core-ring--inner"></div>
                  <div class="eve-preloader-core-sweep"></div>
                  <div class="eve-preloader-center">
                    <img src="/favicon.svg" alt="" class="eve-preloader-logo" />
                  </div>
                </div>
                <div class="eve-preloader-core-caption">Neocom uplink</div>
              </div>
              <div class="eve-preloader-copy">
                <div class="eve-preloader-kicker">
                  <span>Capsuleer channel</span>
                  <span class="eve-preloader-chip">Secure</span>
                </div>
                <div class="eve-preloader-title">EVE Flipper</div>
                <div class="eve-preloader-status">
                  <span>Loading</span>
                  <span class="eve-preloader-dot"></span>
                  <span class="eve-preloader-dot eve-preloader-dot--delay-1"></span>
                  <span class="eve-preloader-dot eve-preloader-dot--delay-2"></span>
                </div>
                <div class="eve-preloader-telemetry">
                  <div class="eve-preloader-line">
                    <span class="eve-preloader-label">Cluster</span>
                    <span class="eve-preloader-value">Tranquility</span>
                  </div>
                  <div class="eve-preloader-line">
                    <span class="eve-preloader-label">Uplink</span>
                    <span class="eve-preloader-value eve-preloader-value--accent">Stable</span>
                  </div>
                  <div class="eve-preloader-line">
                    <span class="eve-preloader-label">Session</span>
                    <span class="eve-preloader-value">Handshake</span>
                  </div>
                </div>
                <div class="eve-preloader-footer">
                  <span class="eve-preloader-label">Node</span>
                  <span class="eve-preloader-value eve-preloader-value--accent">Jita relay</span>
                </div>
              </div>
            </div>
            <div class="eve-preloader-bar">
              <span class="eve-preloader-bar-fill"></span>
            </div>
            <div class="eve-preloader-bar-scale">
              <span>0%</span>
              <span>50%</span>
              <span>100%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
